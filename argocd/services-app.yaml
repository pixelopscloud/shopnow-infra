apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopnow-user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pixelopscloud/shopnow-infra
    targetRevision: main
    path: helm/user-service
  destination:
    server: https://kubernetes.default.svc
    namespace: shopnow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
