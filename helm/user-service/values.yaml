replicaCount: 1

image:
  repository: pixelopscloud/shopnow-user-service
  tag: "f9d32df"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3001

env:
  PORT: "3001"
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/shopnow_users"
  JWT_SECRET: "shopnow_super_secret_jwt_key_2024"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"